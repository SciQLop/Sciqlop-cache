name: GH Actions

on:
  release:
    types: [published]
  push:
  pull_request:

# Auto-cancel superseded runs of the same branch/PR. Releases never
# cancel each other (the tag ref is unique).
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'release' && github.ref || (github.head_ref || github.ref_name) }}
  cancel-in-progress: ${{ github.event_name != 'release' }}

jobs:
  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        run: pipx run build --sdist
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cibw-sdist
          path: dist/*.tar.gz

  build_wheels:
    name: ${{ matrix.os }} ${{ matrix.CIBW_ARCHS }} wheels
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            CIBW_ENVIRONMENT: ''
            CIBW_ARCHS: "x86_64"
          - os: ubuntu-24.04-arm
            CIBW_ENVIRONMENT: ''
            CIBW_ARCHS: "aarch64"
          - os: windows-latest
            CIBW_ENVIRONMENT: ''
            CIBW_ARCHS: "AMD64"
          - os: macos-15-intel
            CIBW_ENVIRONMENT: >
              MACOSX_DEPLOYMENT_TARGET='13.0'
            CIBW_ARCHS: "x86_64"
          - os: macos-14 # Apple Silicon
            CIBW_ENVIRONMENT: >
              MACOSX_DEPLOYMENT_TARGET='13.0'
            CIBW_ARCHS: "arm64"
    env:
      CIBW_ENVIRONMENT: ${{ matrix.CIBW_ENVIRONMENT }}
      CIBW_SKIP: "*-win32 *i686"
      CIBW_ARCHS: ${{ matrix.CIBW_ARCHS }}
      CIBW_PRERELEASE_PYTHONS: "True"
      # see https://github.com/matplotlib/matplotlib/pull/28687/files#diff-504e739c530d50b780e9a09ae8fd0c3ea8258ea7553be06afb06f03f95b1ee0aR103
      CIBW_CONFIG_SETTINGS_WINDOWS: >-
        setup-args="--vsenv"
        setup-args="-Db_vscrt=mt"
        setup-args="-Dcpp_link_args=['ucrt.lib','vcruntime.lib','/nodefaultlib:libucrt.lib','/nodefaultlib:libvcruntime.lib']"
    steps:
      - uses: actions/checkout@v4

      # ccache for Linux wheels: cibuildwheel runs the build inside the
      # manylinux/musllinux container, so we mount a host-side ccache dir
      # into it (CIBW_CONTAINER_ENGINE), install ccache inside the
      # container (CIBW_BEFORE_ALL_LINUX), and point CC/CXX at it. The
      # cache mostly hits on stable subprojects (sqlite3.c is the big
      # one — ~60s per build) across the 6 Python builds for one platform
      # and across runs that don't bump subproject versions.
      - name: Restore ccache (Linux)
        if: runner.os == 'Linux'
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-${{ matrix.os }}-${{ matrix.CIBW_ARCHS }}-${{ hashFiles('subprojects/*.wrap', 'meson.build') }}
          restore-keys: |
            ccache-${{ matrix.os }}-${{ matrix.CIBW_ARCHS }}-

      - name: Configure ccache for cibuildwheel (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p ${{ github.workspace }}/.ccache
          chmod -R 777 ${{ github.workspace }}/.ccache
          # Try every package manager / repo combo we might land in:
          #   musllinux (Alpine: apk), manylinux_2_28 (AlmaLinux 8: PowerTools),
          #   manylinux_2_34 (AlmaLinux 9: CRB), manylinux2014 (CentOS 7: EPEL).
          INSTALL_CCACHE='( command -v apk && apk add --no-cache ccache ) || ( dnf install -y --enablerepo=powertools ccache 2>/dev/null ) || ( dnf install -y --enablerepo=crb ccache 2>/dev/null ) || ( yum install -y epel-release && yum install -y ccache )'
          echo "CIBW_BEFORE_ALL_LINUX=$INSTALL_CCACHE" >> $GITHUB_ENV
          echo 'CIBW_ENVIRONMENT_LINUX=CCACHE_DIR=/host_ccache CCACHE_MAXSIZE=500M CC="ccache gcc" CXX="ccache g++"' >> $GITHUB_ENV
          echo 'CIBW_CONTAINER_ENGINE=docker; create_args: --volume=${{ github.workspace }}/.ccache:/host_ccache' >> $GITHUB_ENV

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.1.4

      - name: Show ccache size (Linux)
        if: runner.os == 'Linux' && always()
        run: du -sh ${{ github.workspace }}/.ccache 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  test_wheels:
    needs: [build_wheels]
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15-intel, macos-14, windows-latest, ubuntu-latest, ubuntu-24.04-arm]
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14', '3.14t']
    runs-on: ${{ matrix.os }}
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
          #architecture: x64
      - uses: actions/download-artifact@v4
        with:
          pattern: cibw-wheels-*
          path: dist
          merge-multiple: true
      - name: install wheel (Unix)
        if: runner.os != 'Windows'
        run: |
          pip install numpy
          pip install --no-index --find-links $GITHUB_WORKSPACE/dist pysciqlop-cache
      - name: install wheel (Windows)
        if: runner.os == 'Windows'
        run: |
          pip install numpy
          pip install --no-index --find-links $env:GITHUB_WORKSPACE\dist pysciqlop-cache
      - uses: actions/checkout@v4
      - name: run tests
        # Two interacting issues, fixed together:
        #
        # 1. multiprocessing.Pool workers under spawn (macOS/Windows always)
        #    or forkserver (Linux Python 3.14+ default) re-import the
        #    function's module by name. pytest assigns name
        #    'tests.python.test_concurrency_bugs', so workers need to be able
        #    to `import tests`. Add repo root to PYTHONPATH for that.
        #
        # 2. But the source `pysciqlop_cache/` directory is at the repo root
        #    and shadows the installed wheel: its __init__.py does
        #    `from ._pysciqlop_cache import …` and the compiled .so only
        #    exists in site-packages. Remove the source dir from the
        #    workspace before running tests so the installed wheel wins.
        #    (Cross-platform via Python's shutil.)
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pip install pytest pytest-timeout ddt requests hypothesis diskcache
          python -c "import shutil; shutil.rmtree('pysciqlop_cache', ignore_errors=True)"
          # --timeout=300 (5 min) so a hang fails fast with a stack trace
          # instead of running until the GitHub job timeout. Real tests on
          # Windows can be slow (cross-process SQLite + fcntl emulation) but
          # 5 min is a generous ceiling — if anything exceeds it, that's a
          # bug to investigate, not a number to bump.
          # --timeout-method=thread so threaded/multiproc tests can be killed
          # cleanly on Windows (the default 'signal' method needs SIGALRM
          # which Windows doesn't have).
          python -m pytest --import-mode=importlib --tb=short --disable-warnings -v --timeout=300 --timeout-method=thread tests/python --ignore=tests/python/test_torture.py --ignore=tests/python/test_hypothesis.py

  upload_pypi:
    needs: [build_sdist, build_wheels, test_wheels]
    runs-on: ubuntu-latest
    # upload to PyPI only on github releases
    if: github.event_name == 'release' && github.event.action == 'published' && github.repository_owner == 'SciQLop'
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: cibw-*
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_PASSWORD }}
          skip-existing: true

  upload_test_pypi:
    needs: [build_sdist, build_wheels, test_wheels]
    runs-on: ubuntu-latest
    # upload to test PyPI on github pushes
    if: github.event_name == 'push' && github.repository_owner == 'SciQLop'
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: cibw-*
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_TEST_PASSWORD }}
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
